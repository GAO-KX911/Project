<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>火灾目标检测系统</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            margin: 20px; 
        }
        .container { 
            display: flex; 
            gap: 30px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .upload-section, .result-section { 
            flex: 1; 
            min-width: 500px; 
        }
        .image-container {
            border: 2px solid #ddd;
            padding: 10px; margin: 10px 0; 
            height: 400px;
            display: flex; 
            align-items: center; 
            justify-content: center;
             overflow: hidden;
        }
        #result-text {
            width: 100%; 
            height: 100%; 
            border: none; 
            padding: 10px;
            font-family: monospace; 
            white-space: pre-wrap; 
            overflow: auto;
            background: white; 
            line-height: 1.5;
        }
        .button-group { 
            display: flex; 
            gap: 10px; 
            margin: 25px 0; 
            width: 100%; 
        }
        button {
            padding: 12px 0; 
            font-size: 14px; 
            cursor: pointer;
            border: none; 
            border-radius: 4px; 
            flex: 1; 
            min-width: 90px;
        }
        .submit-btn { 
            background-color: #2196F3; 
            color: white; 
        }
        .clear-btn { 
            background-color: #f44336; 
            color: white; 
        }
        #processing-time {
            padding: 12px 0; 
            border: 2px solid #ddd; 
            margin: 25px 0 0;
            text-align: center; 
            font-size: 16px; 
            font-weight: bold; 
            width: 100%;
        }
        .section-title { 
            font-size: 20px; 
            font-weight: bold; 
            margin: 10px 0; 
        }
        #image-path-input { 
            width: 100%; 
            padding: 10px; 
            font-size: 16px; 
        }
        .coordinates { 
            color: #2196F3; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 左侧路径输入区域 -->
    <div class="upload-section">
        <div class="section-title">请输入图片路径</div>
        <input type="text" id="image-path-input" placeholder="original / roi">
        <div class="button-group">
            <button class="clear-btn" onclick="clearAll()">清除</button>
            <button class="submit-btn" onclick="submitDetection()">提交检测</button>
        </div>
    </div>

    <!-- 右侧结果展示区域 -->
    <div class="result-section">
        <div class="section-title">检测结果</div>
        <div class="image-container">
            <div id="result-text"></div>
        </div>
        <div id="processing-time">处理时间：-- 毫秒</div>
    </div>
</div>

<script>
    function clearAll() {
        document.getElementById('image-path-input').value = '';
        document.getElementById('result-text').textContent = '';
        document.getElementById('processing-time').textContent = '处理时间：-- 毫秒';
    }

    function submitDetection() {
        const path = document.getElementById('image-path-input').value.trim();
        if (!path) {
            alert('请输入图片路径');
            return;
        }

        fetch('/detect_by_path', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ path })
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                document.getElementById('result-text').textContent = data.error;
                return;
            }

            let output = `图片尺寸：${data.dimensions.width} x ${data.dimensions.height}\n\n`;
            if (data.detections.length > 0) {
                data.detections.forEach((det, idx) => {
                    output += `目标 ${idx + 1}:\n`;
                    output += `▸ 类别: ${det.class}\n`;
                    output += `▸ 坐标: [${det.coordinates.map(p => `(${p[0]}, ${p[1]})`).join(', ')}]\n`;
                    output += `▸ 置信度: ${det.confidence.toFixed(4)}\n\n`;
                });
            } else {
                output += "未检测到有效目标";
            }

            document.getElementById('result-text').innerHTML = output.replace(/\[(.*?)\]/g, '<span class="coordinates">[$1]</span>');
            document.getElementById('processing-time').textContent = `处理时间：${data.time} 毫秒`;
        })
        .catch(error => {
            console.error('Error:', error);
            document.getElementById('result-text').textContent = '检测失败，请重试';
        });
    }
</script>
</body>
</html>
